<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast TMA</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background-color: #121212; overflow: hidden; display: flex; justify-content: center; }
        canvas { touch-action: none; }
    </style>
</head>
<body>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 650,
            backgroundColor: '#1a1a1a',
            scene: { preload: preload, create: create }
        };

        const game = new Phaser.Game(config);

        function preload() {
            // Blok uchun oddiy oq kvadrat yaratish
            this.load.image('block', 'https://labs.phaser.io/assets/sprites/50x50.png');
        }

        function create() {
            const gridSize = 8;
            const cellSize = 45;
            const startX = 40;
            const startY = 100;

            // 1. Maydonni (Grid) chizish
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    this.add.rectangle(startX + c * cellSize, startY + r * cellSize, 40, 40, 0x333333);
                }
            }

            // 2. Namuna bloklarini yaratish (uchta blok)
            const colors = [0xff5733, 0x33ff57, 0x3357ff];
            
            for (let i = 0; i < 3; i++) {
                let piece = this.add.container(80 + i * 120, 550);
                
                // Kvadrat shaklidagi blok (2x2)
                for(let r=0; r<2; r++) {
                    for(let c=0; c<2; c++) {
                        let b = this.add.sprite(c*22, r*22, 'block').setDisplaySize(20, 20);
                        b.setTint(colors[i]);
                        piece.add(b);
                    }
                }

                piece.setSize(44, 44);
                piece.setInteractive({ draggable: true });

                // 3. Surish mexanikasi
                this.input.setDraggable(piece);
            }

            this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
                gameObject.x = dragX;
                gameObject.y = dragY;
            });

            this.input.on('dragend', (pointer, gameObject) => {
                // Joyiga qaytarish (Snap mantiqi hozircha sodda)
                if (gameObject.y > 450) {
                    gameObject.y = 550;
                }
            });

            this.add.text(100, 30, "BLOCK BLAST", { fontSize: '32px', fill: '#fff', fontWeight: 'bold' });
        }
    </script>
</body>
</html>
