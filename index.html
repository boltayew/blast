<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>body { margin: 0; background: #1a1a1a; overflow: hidden; }</style>
</head>
<body>
<script>
    const config = {
        type: Phaser.AUTO, width: 400, height: 650, backgroundColor: '#1a1a1a',
        scene: { preload: preload, create: create }
    };
    new Phaser.Game(config);
    let grid = Array(8).fill().map(() => Array(8).fill(0));
    let gridSprites = Array(8).fill().map(() => Array(8).fill(null));
    let score = 0, scoreText;

    const SHAPES = [
        { s: [[1,1], [1,1]], c: 0xff5733 }, // Kvadrat
        { s: [[1,1,1,1]], c: 0x33ff57 },    // Tayoqcha
        { s: [[1,1,1], [0,1,0]], c: 0xf333ff } // T-shakl
    ];

    function preload() { this.load.image('t', 'https://labs.phaser.io/assets/sprites/50x50.png'); }

    function create() {
        scoreText = this.add.text(20, 30, 'Score: 0', { fontSize: '28px', fill: '#fff' });
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                gridSprites[r][c] = this.add.rectangle(42 + c * 45, 120 + r * 45, 40, 40, 0x333333);
            }
        }
        spawnNewPiece(this);
    }

    function spawnNewPiece(scene) {
        const type = SHAPES[Math.floor(Math.random() * SHAPES.length)];
        const container = scene.add.container(200, 550);
        type.s.forEach((row, rIdx) => {
            row.forEach((val, cIdx) => {
                if (val) container.add(scene.add.sprite(cIdx*25, rIdx*25, 't').setDisplaySize(23, 23).setTint(type.c));
            });
        });
        container.setSize(100, 100).setInteractive({ draggable: true });
        scene.input.setDraggable(container);
        
        container.on('drag', (p, dx, dy) => { container.x = dx; container.y = dy; });
        container.on('dragend', () => {
            let c = Math.round((container.x - 42) / 45), r = Math.round((container.y - 120) / 45);
            if (canPlace(r, c, type.s)) {
                type.s.forEach((row, i) => row.forEach((v, j) => {
                    if(v) { grid[r+i][c+j]=1; gridSprites[r+i][c+j].setFillStyle(type.c); }
                }));
                container.destroy();
                clearLines();
                spawnNewPiece(scene);
            } else { container.x = 200; container.y = 550; }
        });
    }

    function canPlace(r, c, s) {
        return s.every((row, i) => row.every((v, j) => !v || (r+i>=0 && r+i<8 && c+j>=0 && c+j<8 && grid[r+i][c+j]===0)));
    }

    function clearLines() {
        for(let i=0; i<8; i++) {
            if(grid[i].every(v => v === 1)) {
                grid[i] = Array(8).fill(0);
                gridSprites[i].forEach(s => s.setFillStyle(0x333333));
                score += 100;
            }
        }
        scoreText.setText('Score: ' + score);
    }
</script>
</body>
</html>
